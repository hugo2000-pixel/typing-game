<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type Rush</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #0a0a0a; color: #ededed; font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
    textarea { outline: none; }
    .selection\:bg-green-500\/30::selection { background-color: rgba(34, 197, 94, 0.3); }
    .selection\:text-green-200::selection { color: #bbf7d0; }
  </style>
</head>
<body class="selection:bg-green-500/30 selection:text-green-200">
  <div id="root" class="h-full w-full"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const sentences = [
      "The quick brown fox jumps over the lazy dog.",
      "Coding is the art of solving problems with logic.",
      "A small step today leads to a giant leap tomorrow.",
      "Type as fast as you can but try not to make mistakes.",
      "A journey of a thousand miles begins with a single step.",
      "To be or not to be, that is the question.",
      "All that glitters is not gold, but some of it is.",
      "Actions speak louder than words in most situations.",
      "Knowledge is power, but enthusiasm pulls the switch.",
      "The early bird catches the worm before sunrise.",
      "Good things come to those who wait and work hard.",
      "Practice makes perfect when you are learning to type.",
      "Every cloud has a silver lining if you look closely.",
      "Don't judge a book by its cover or its title.",
      "When in Rome, do as the Romans do.",
      "Better late than never is a terrible excuse.",
      "Two wrongs don't make a right in programming.",
      "The pen is mightier than the sword in debates.",
      "Where there is a will, there is always a way.",
      "Time flies when you are having fun writing code.",
      "Laughter is the best medicine for a stressful day.",
      "Honesty is the best policy for a clear conscience.",
      "A picture is worth a thousand words of explanation.",
      "You cannot have your cake and eat it too.",
      "Out of sight, out of mind is often the truth.",
      "Absence makes the heart grow fonder over time.",
      "Fortune favors the bold in the face of danger.",
      "Beauty is in the eye of the beholder, always.",
      "Necessity is the mother of all great inventions.",
      "You can't make an omelet without breaking a few eggs."
    ];

    const getRandomSentence = () => {
      const randomIndex = Math.floor(Math.random() * sentences.length);
      return sentences[randomIndex];
    };

    function TypeRushApp() {
      const [screen, setScreen] = useState("home");
      const [record, setRecord] = useState(null);

      const [sentence, setSentence] = useState("");
      const [input, setInput] = useState("");
      const [startTime, setStartTime] = useState(null);
      const [elapsedTime, setElapsedTime] = useState(0);
      const [errors, setErrors] = useState(0);
      const [totalKeystrokes, setTotalKeystrokes] = useState(0);
      
      const [isNewRecord, setIsNewRecord] = useState(false);
      const [finalTime, setFinalTime] = useState(0);
      const [finalAccuracy, setFinalAccuracy] = useState(0);
      const [finalWpm, setFinalWpm] = useState(0);

      const timerRef = useRef(null);
      const inputRef = useRef(null);

      useEffect(() => {
        const saved = localStorage.getItem("typeRushRecord");
        if (saved) {
          try {
            setRecord(JSON.parse(saved));
          } catch (e) {
            console.error("Failed to parse record", e);
          }
        }
      }, []);

      useEffect(() => {
        if (startTime !== null && screen === "game") {
          timerRef.current = setInterval(() => {
            setElapsedTime((Date.now() - startTime) / 1000);
          }, 100);
        }
        return () => {
          if (timerRef.current) clearInterval(timerRef.current);
        };
      }, [startTime, screen]);

      useEffect(() => {
        if (screen === "game" && inputRef.current) {
          inputRef.current.focus();
        }
      }, [screen]);

      const startGame = () => {
        setSentence(getRandomSentence());
        setInput("");
        setStartTime(null);
        setElapsedTime(0);
        setErrors(0);
        setTotalKeystrokes(0);
        setIsNewRecord(false);
        setScreen("game");
      };

      const handleInputChange = (e) => {
        const value = e.target.value;
        const addedLength = value.length - input.length;

        if (startTime === null && value.length > 0) {
          setStartTime(Date.now());
        }

        let currentTotalKeystrokes = totalKeystrokes;
        let currentErrors = errors;

        if (addedLength > 0) {
          currentTotalKeystrokes += addedLength;
          setTotalKeystrokes(currentTotalKeystrokes);
          
          let newErrors = 0;
          for (let i = input.length; i < value.length; i++) {
            if (value[i] !== sentence[i]) {
              newErrors++;
            }
          }
          currentErrors += newErrors;
          setErrors(currentErrors);
        }

        setInput(value);

        if (value.length === sentence.length) {
          finishGame(currentTotalKeystrokes, currentErrors);
        }
      };

      const finishGame = (finalTotalKeystrokes, finalErrors) => {
        if (timerRef.current) clearInterval(timerRef.current);
        
        const time = startTime ? (Date.now() - startTime) / 1000 : 0;
        const accuracy = finalTotalKeystrokes > 0 ? ((finalTotalKeystrokes - finalErrors) / finalTotalKeystrokes) * 100 : 100;
        const minutes = time / 60;
        const wpm = minutes > 0 ? Math.max(0, Math.round(((finalTotalKeystrokes / 5) - finalErrors) / minutes)) : 0;
        
        setFinalTime(time);
        setFinalAccuracy(accuracy);
        setFinalWpm(wpm);
        
        const newRecord = {
          bestTimeSeconds: record ? Math.min(record.bestTimeSeconds, time) : time,
          bestAccuracy: record ? Math.max(record.bestAccuracy, accuracy) : accuracy,
          bestWpm: record?.bestWpm ? Math.max(record.bestWpm, wpm) : wpm,
          gamesPlayed: (record?.gamesPlayed || 0) + 1,
        };
        
        if (!record || time < record.bestTimeSeconds) {
          setIsNewRecord(true);
        }

        localStorage.setItem("typeRushRecord", JSON.stringify(newRecord));
        setRecord(newRecord);
        setScreen("result");
      };

      const renderHome = () => (
        <div className="flex flex-col items-center justify-center h-full space-y-8 animate-in fade-in zoom-in duration-500">
          <h1 className="text-6xl font-black tracking-tighter bg-gradient-to-r from-green-400 to-emerald-600 bg-clip-text text-transparent">
            Type Rush
          </h1>
          
          <div className="bg-neutral-900 border border-neutral-800 p-8 rounded-2xl shadow-2xl flex flex-col items-center text-center space-y-4 max-w-sm w-full">
            {record ? (
              <React.Fragment>
                <h2 className="text-xl font-bold text-neutral-400 uppercase tracking-widest text-sm">Your Best Record</h2>
                <div className="grid grid-cols-3 gap-4 w-full">
                  <div className="bg-neutral-800 p-4 rounded-xl">
                    <div className="text-3xl font-mono font-bold text-green-400">{record.bestWpm || 0}</div>
                    <div className="text-xs text-neutral-400 mt-1 uppercase">Best WPM</div>
                  </div>
                  <div className="bg-neutral-800 p-4 rounded-xl">
                    <div className="text-3xl font-mono font-bold text-white">{record.bestTimeSeconds.toFixed(1)}<span className="text-lg text-neutral-500">s</span></div>
                    <div className="text-xs text-neutral-400 mt-1 uppercase">Best Time</div>
                  </div>
                  <div className="bg-neutral-800 p-4 rounded-xl">
                    <div className="text-3xl font-mono font-bold text-white">{record.bestAccuracy.toFixed(0)}<span className="text-lg text-neutral-500">%</span></div>
                    <div className="text-xs text-neutral-400 mt-1 uppercase">Accuracy</div>
                  </div>
                </div>
                <div className="text-sm text-neutral-500 mt-2">Games played: {record.gamesPlayed}</div>
                <button 
                  onClick={() => {
                    localStorage.removeItem("typeRushRecord");
                    setRecord(null);
                  }}
                  className="mt-4 text-xs text-neutral-500 hover:text-red-400 underline transition-colors"
                >
                  Reset My Records
                </button>
              </React.Fragment>
            ) : (
              <div className="text-neutral-400 py-6">
                No record yet &mdash; play your first game!
              </div>
            )}
          </div>

          <button 
            onClick={startGame}
            className="px-8 py-4 bg-white text-black text-lg font-bold rounded-full hover:scale-105 hover:bg-neutral-200 transition-all active:scale-95 shadow-[0_0_40px_rgba(255,255,255,0.3)]"
          >
            Start New Game
          </button>
        </div>
      );

      const renderGame = () => {
        return (
          <div className="flex flex-col items-center justify-center h-full space-y-12 animate-in fade-in duration-300 w-full max-w-4xl px-6">
            <div className="flex justify-between w-full max-w-2xl font-mono text-xl bg-neutral-900 px-6 py-4 rounded-2xl border border-neutral-800 shadow-lg">
              <div className="flex flex-col">
                <span className="text-neutral-500 text-sm uppercase tracking-wider mb-1">Time</span>
                <span className="text-2xl font-bold text-white">{elapsedTime.toFixed(1)}s</span>
              </div>
              <div className="flex flex-col items-center">
                <span className="text-neutral-500 text-sm uppercase tracking-wider mb-1">WPM</span>
                <span className="text-2xl font-bold text-green-400">
                  {elapsedTime > 0 ? Math.max(0, Math.round(((totalKeystrokes / 5) - errors) / (elapsedTime / 60))) : 0}
                </span>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-neutral-500 text-sm uppercase tracking-wider mb-1">Errors</span>
                <span className={`text-2xl font-bold ${errors > 0 ? "text-red-500" : "text-white"}`}>{errors}</span>
              </div>
            </div>

            <div className="relative w-full max-w-2xl">
              <div className="font-mono text-3xl md:text-4xl leading-relaxed text-neutral-600 pointer-events-none select-none break-words">
                {sentence.split("").map((char, index) => {
                  let colorClass = "text-neutral-600";
                  if (index < input.length) {
                    if (input[index] === char) {
                      colorClass = "text-green-400";
                    } else {
                      colorClass = "text-red-500 bg-red-500/20 rounded-sm";
                    }
                  }
                  return (
                    <span key={index} className={`${colorClass} transition-colors duration-75`}>
                      {char}
                    </span>
                  );
                })}
              </div>

              <textarea
                ref={inputRef}
                value={input}
                onChange={handleInputChange}
                className="absolute inset-0 w-full h-full opacity-0 cursor-text resize-none"
                spellCheck={false}
                autoComplete="off"
                autoCorrect="off"
                autoCapitalize="off"
              />
              
              <div 
                className="absolute top-0 bottom-0 pointer-events-none flex font-mono text-3xl md:text-4xl leading-relaxed break-words"
                aria-hidden="true"
              >
                <span className="text-transparent">{sentence.substring(0, input.length)}</span>
                <span className="w-1 h-[1.2em] bg-white animate-pulse mt-1 rounded-full"></span>
              </div>
            </div>
            
            <p className="text-neutral-500 text-sm animate-pulse">Start typing to begin...</p>
          </div>
        );
      };

      const renderResult = () => (
        <div className="flex flex-col items-center justify-center h-full space-y-8 animate-in slide-in-from-bottom-8 fade-in duration-500">
          {isNewRecord && (
            <div className="inline-flex items-center space-x-2 bg-yellow-500/20 text-yellow-500 px-4 py-2 rounded-full font-bold animate-bounce">
              <span>🏆</span>
              <span>New Record!</span>
            </div>
          )}
          
          <div className="bg-neutral-900 border border-neutral-800 p-10 rounded-3xl shadow-2xl flex flex-col items-center text-center space-y-8 max-w-md w-full relative overflow-hidden">
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-green-500/10 blur-[50px] rounded-full pointer-events-none"></div>

            <h2 className="text-4xl font-black text-white relative z-10">Completed!</h2>
            
            <div className="grid grid-cols-3 gap-4 w-full relative z-10">
              <div className="flex flex-col items-center p-4 bg-neutral-950 rounded-2xl border border-neutral-800/50">
                <span className="text-4xl font-mono font-bold text-green-400">{finalWpm}</span>
                <span className="text-neutral-500 text-sm mt-2 uppercase tracking-widest font-bold">WPM</span>
              </div>
              <div className="flex flex-col items-center p-4 bg-neutral-950 rounded-2xl border border-neutral-800/50">
                <span className="text-3xl font-mono font-bold text-white">{finalTime.toFixed(1)}s</span>
                <span className="text-neutral-500 text-sm mt-2 uppercase tracking-widest font-bold">Time</span>
              </div>
              <div className="flex flex-col items-center p-4 bg-neutral-950 rounded-2xl border border-neutral-800/50">
                <span className="text-3xl font-mono font-bold text-white">{finalAccuracy.toFixed(0)}%</span>
                <span className="text-neutral-500 text-sm mt-2 uppercase tracking-widest font-bold">Accuracy</span>
              </div>
            </div>

            <div className="flex items-center space-x-2 text-neutral-400 relative z-10 bg-neutral-950 px-6 py-3 rounded-full border border-neutral-800/50">
              <span className="font-bold">Total Errors:</span>
              <span className={`font-mono text-xl font-bold ${errors > 0 ? "text-red-500" : "text-green-500"}`}>{errors}</span>
            </div>
          </div>

          <button 
            onClick={() => setScreen("home")}
            className="px-8 py-4 bg-neutral-800 hover:bg-neutral-700 text-white text-lg font-bold rounded-full transition-all hover:scale-105 active:scale-95"
          >
            Back to Home
          </button>
        </div>
      );

      return (
        <main className="h-full w-full bg-neutral-950 text-white flex flex-col">
          <div className="flex-1 w-full flex items-center justify-center p-4">
            {screen === "home" && renderHome()}
            {screen === "game" && renderGame()}
            {screen === "result" && renderResult()}
          </div>
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TypeRushApp />);
  </script>
</body>
</html>
